name: Sync to MkDocs Repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Full Mirror
        uses: actions/checkout@v4

      - name: Checkout MkDocs Repo
        uses: actions/checkout@v4
        with:
          repository: ag999git/001-mkdocs
          path: mkdocs-repo
          token: ${{ secrets.MIRROR_TOKEN }}

      - name: Sync specific folders
        run: |
          rm -rf mkdocs-repo/docs/*
          
          for folder in 01-* 02-* 03-* 04-* 05-* 06-* 07-* 08-* 09-* 10-* images colab-nb; do
            if [ -d "$folder" ]; then
              cp -r "$folder" mkdocs-repo/docs/
            fi
          done
          
          # Delete GitBook files
          find mkdocs-repo/docs -name "summary.md" -delete
          
          # Rename GitBook README.md to MkDocs index.md
          find mkdocs-repo/docs -name "README.md" -execdir mv {} index.md \;

      - name: Commit and Push to MkDocs Repo
        run: |
          cd mkdocs-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update content from mirror"
          git push
